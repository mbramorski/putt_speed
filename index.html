<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Putt Speed</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body {
      background:#000;
      font-family:'DM Sans',system-ui,sans-serif;
      color:#fff;
      width:100vw; height:100vh;
      overflow:hidden; position:fixed;
    }
    #video {
      position:absolute; inset:0;
      width:100%; height:100%;
      object-fit:cover; opacity:0.65;
    }
    #canvas { display:none; }

    /* ── tap-to-identify overlay ── */
    #tap-screen {
      position:absolute; inset:0; z-index:20;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      gap:20px;
      background:rgba(0,0,0,0.55);
      cursor:crosshair;
    }
    #tap-screen.hidden { display:none; }
    .tap-icon {
      width:64px; height:64px;
      border:2.5px solid rgba(255,218,0,0.85);
      border-radius:50%;
      display:flex; align-items:center; justify-content:center;
    }
    .tap-icon::after {
      content:''; width:8px; height:8px;
      background:rgba(255,218,0,0.9); border-radius:50%;
    }
    .tap-title {
      font-size:20px; font-weight:600;
      color:#fff; letter-spacing:-.01em;
    }
    .tap-sub {
      font-size:13px; color:rgba(255,255,255,0.45);
      text-align:center; max-width:240px; line-height:1.6;
    }

    /* ── crosshair cursor follows finger ── */
    #cursor {
      position:absolute;
      width:48px; height:48px;
      border:2px solid rgba(255,218,0,0.8);
      border-radius:50%;
      transform:translate(-50%,-50%);
      pointer-events:none;
      display:none;
    }
    #cursor::after {
      content:''; position:absolute;
      top:50%; left:50%; transform:translate(-50%,-50%);
      width:6px; height:6px;
      background:rgba(255,218,0,.9); border-radius:50%;
    }

    /* ── main overlay: controls + status pinned to top, speed reading pushed to bottom ── */
    #overlay {
      position:absolute; inset:0;
      display:flex; flex-direction:column;
      align-items:center;
      padding: max(env(safe-area-inset-top),28px) 24px max(env(safe-area-inset-bottom),28px);
      pointer-events:none;
    }

    #top-bar { display:flex; flex-direction:column; align-items:center; gap:14px; }

    #controls {
      display:flex; gap:10px;
      justify-content:center; flex-wrap:wrap;
      pointer-events:all;
    }
    .btn {
      font-family:inherit; font-size:11px;
      letter-spacing:.09em; text-transform:uppercase;
      color:rgba(255,255,255,.45);
      background:rgba(0,0,0,.4);
      border:1.5px solid rgba(255,255,255,.15);
      border-radius:6px; padding:10px 18px; cursor:pointer;
    }
    .btn.on { color:#fff; border-color:rgba(255,255,255,.55); background:rgba(255,255,255,.1); }
    .btn.static { cursor:default; }

    #status-wrap { display:flex; flex-direction:column; align-items:center; gap:8px; }
    #app-label { font-size:10px; letter-spacing:.18em; text-transform:uppercase; color:rgba(255,255,255,.28); }
    #status {
      font-size:12px; letter-spacing:.1em; text-transform:uppercase;
      color:rgba(255,90,90,.85);
      background:rgba(0,0,0,.45);
      padding:7px 20px; border-radius:30px;
      border:1px solid rgba(255,90,90,.4);
      transition:color .2s, border-color .2s;
    }
    #status.found   { color:rgba(70,220,120,.95); border-color:rgba(70,220,120,.5); }
    #status.ready   { color:rgba(70,220,120,1);   border-color:rgba(70,220,120,.75); }
    #status.reading { color:#fff;                 border-color:rgba(70,220,120,.9); }

    #speed-display {
      text-align:center;
      margin-top:auto;
      opacity:0; transform:scale(.93);
      transition:opacity .13s ease, transform .13s ease;
      pointer-events:none;
    }
    #speed-display.visible { opacity:1; transform:scale(1); }
    #speed-number {
      font-size:clamp(84px,23vw,124px);
      font-weight:700; letter-spacing:-.05em; line-height:1;
      color:#fff; text-shadow:0 2px 40px rgba(0,0,0,.9);
    }
    #speed-unit {
      font-size:12px; font-weight:400;
      letter-spacing:.16em; text-transform:uppercase;
      color:rgba(255,255,255,.4); margin-top:10px;
    }

    /* ── ball ring ── */
    #ring {
      position:absolute;
      border:3px solid rgba(255,218,0,.9);
      border-radius:50%;
      transform:translate(-50%,-50%);
      pointer-events:none; display:none;
      box-shadow:0 0 0 1px rgba(0,0,0,.4), 0 0 16px rgba(255,218,0,.5);
    }

    #history {
      position:absolute; right:18px; top:50%; transform:translateY(-50%);
      display:flex; flex-direction:column; gap:6px;
      align-items:flex-end;
      pointer-events:none; z-index:10;
    }
    #history .hist-item {
      font-size:13px; font-weight:500; letter-spacing:.02em;
      color:rgba(255,255,255,.35);
      background:rgba(0,0,0,.35);
      padding:4px 10px; border-radius:6px;
      white-space:nowrap;
    }
    #history .hist-item:first-child {
      font-size:16px; font-weight:700;
      color:rgba(255,218,0,.9);
      background:rgba(0,0,0,.5);
    }

    #error-msg {
      position:absolute; inset:0; display:none;
      align-items:center; justify-content:center;
      flex-direction:column; gap:14px; text-align:center; padding:32px;
      background:rgba(0,0,0,.88);
    }
    #error-msg.show { display:flex; }
    #error-msg h2 { font-size:20px; font-weight:600; }
    #error-msg p  { font-size:14px; color:rgba(255,255,255,.5); line-height:1.55; }
  </style>
</head>
<body>

<video id="video" playsinline autoplay muted></video>
<canvas id="canvas"></canvas>
<div id="cursor"></div>

<!-- Tap to identify screen -->
<div id="tap-screen">
  <div class="tap-icon"></div>
  <div class="tap-title">Tap the ball</div>
  <div class="tap-sub">Touch the ball in the camera view to lock it in</div>
</div>

<div id="ring"></div>

<div id="overlay">
  <div id="top-bar">
    <div id="controls">
      <button class="btn on" id="voice-btn" onclick="toggleVoice()">Voice On</button>
      <button class="btn on static" id="unit-btn">ft/s</button>
      <button class="btn" onclick="retap()">Re-tap Ball</button>
    </div>
    <div id="status-wrap">
      <div id="app-label">Putt Speed</div>
      <div id="status">Looking for ball…</div>
    </div>
  </div>
  <div id="speed-display">
    <div id="speed-number">0.0</div>
    <div id="speed-unit">ft / sec</div>
  </div>
</div>

<div id="history"></div>

<div id="error-msg">
  <h2>Camera unavailable</h2>
  <p>Allow camera access in your browser settings and reload.</p>
</div>

<script>
// ─────────────────────────────────────────────────
//  CONSTANTS
// ─────────────────────────────────────────────────
const BALL_IN     = 1.68;  // USGA diameter, inches
const TOLERANCE   = 52;    // Euclidean RGB distance for color match
const MIN_PIX     = 10;    // min matching pixels for a valid blob
const MIN_DIAM    = 14;    // px
const MAX_DIAM    = 420;   // px
const STILL_N     = 22;    // frames stable to arm
const MOVE_PX     = 9;     // centroid shift to trigger measuring
const MIN_FRAMES  = 3;
const MAX_FRAMES  = 6; // capped low deliberately — see SPEED comment below
const DISPLAY_MS  = 4200;
const EDGE_MARGIN = 10;    // px margin from frame edge before we call a blob "clipped"

// Localized connected-component search. Instead of scanning the whole
// frame for any matching pixel, we scan a small window around the ball's
// last known position and only accept pixels that are actually CONNECTED
// to each other (flood fill) — not just "matching color somewhere nearby".
// This is what stops the detector from bridging across to a disconnected
// patch of similarly-colored background (that bridging was the real cause
// of the detection ring reading 7-10x larger than the actual ball, and of
// pxPerFoot — and therefore every speed reading — being wildly off).
const INITIAL_SEARCH_RADIUS = 110; // px, used right after tap before we have a diameter estimate
const MIN_SEARCH_RADIUS     = 55;
const MAX_SEARCH_RADIUS     = 300;
const SEARCH_MARGIN_MULT    = 3.5;  // search window radius = last diameter * this
const VELOCITY_MARGIN_PX    = 45;   // extra flat margin added to the search radius while the ball is moving, to absorb the error in a constant-velocity prediction (the ball is decelerating, not moving at constant speed, plus normal detection jitter)
const MAX_COMPONENT_FRAC    = 0.55; // reject a connected blob that fills more than this fraction of the search window
const MAX_MISS_BEFORE_RESET = 45;   // ~0.75s at 60fps of no detection before falling back to a full-window search

const MAX_WIN_DIM   = 2*MAX_SEARCH_RADIUS + 4;
const MAX_WIN_TOTAL = MAX_WIN_DIM*MAX_WIN_DIM;
const matchBuf    = new Uint8Array(MAX_WIN_TOTAL);
const erodeBuf    = new Uint8Array(MAX_WIN_TOTAL);
const visitedBuf  = new Uint8Array(MAX_WIN_TOTAL);
const qxBuf       = new Int32Array(MAX_WIN_TOTAL);
const qyBuf       = new Int32Array(MAX_WIN_TOTAL);
const ERODE_COMPENSATE = 2; // 1px erosion shrinks a filled disk's bbox by ~2px total; add it back
const MOTION_TOLERANCE_MULT = 1.3; // relax color match while the ball is moving, to tolerate motion blur

// ─────────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────────
const S = { SETUP:0, SCANNING:1, ARMED:2, MEASURING:3, DISPLAY:4 };
let state      = S.SETUP;
let targetColor= null;   // { r, g, b } from tap
let stillCount = 0;
let armBall    = null;
let mFrames    = [];
let pxPerFoot  = null;
let displayTmr = null;
let lastSpeed  = null;
let voiceOn    = true;

// Frame-to-frame tracking state for the localized detector
let trackX      = null;
let trackY      = null;
let trackVX     = 0;    // estimated px/frame velocity, used to predict where to search next
let trackVY     = 0;
let trackDiam   = null;
let missStreak  = 0;
let diamHistory = [];  // stable-frame diameters collected while arming, for median calibration
let speedHistory = []; // last 10 accepted putt speeds, most recent first

// ─────────────────────────────────────────────────
//  DOM
// ─────────────────────────────────────────────────
const video     = document.getElementById('video');
const canvas    = document.getElementById('canvas');
const ctx       = canvas.getContext('2d', { willReadFrequently:true });
const tapScreen = document.getElementById('tap-screen');
const cursorEl  = document.getElementById('cursor');
const statusEl  = document.getElementById('status');
const dispEl    = document.getElementById('speed-display');
const numEl     = document.getElementById('speed-number');
const ringEl    = document.getElementById('ring');
const historyEl = document.getElementById('history');
const voiceBtn  = document.getElementById('voice-btn');
const errMsg    = document.getElementById('error-msg');

// ─────────────────────────────────────────────────
//  CAMERA
// ─────────────────────────────────────────────────
async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:'user', width:{ideal:1280}, height:{ideal:720}, frameRate:{ideal:60,min:30} },
      audio:false
    });
    video.srcObject = stream;

    // getUserMedia constraints above are only "ideal" — push the track to
    // its actual reported max frame rate and max zoom where the browser
    // exposes those capabilities. Android Chrome supports both; iOS Safari
    // generally doesn't expose zoom via the web API, so this silently
    // no-ops there rather than failing.
    const track = stream.getVideoTracks()[0];
    if (track && track.getCapabilities) {
      try {
        const caps = track.getCapabilities();
        const advanced = {};
        if (caps.frameRate && caps.frameRate.max) advanced.frameRate = caps.frameRate.max;
        if (caps.zoom && caps.zoom.max) advanced.zoom = caps.zoom.max;
        if (Object.keys(advanced).length) await track.applyConstraints({ advanced:[advanced] });
      } catch(e) { /* capability not supported on this device/browser */ }
    }

    video.addEventListener('loadedmetadata', () => {
      canvas.width  = video.videoWidth;
      canvas.height = video.videoHeight;
      startLoop();
    });
  } catch(e) { errMsg.classList.add('show'); }
}

// ─────────────────────────────────────────────────
//  FRAME SCHEDULING — real capture-time timestamps
//
//  requestAnimationFrame fires on the DISPLAY's refresh cycle, not the
//  camera's actual frame delivery. If the camera is silently running at a
//  lower fps than the display (very common under auto-exposure in anything
//  but bright light), rAF can process the same physical camera frame twice
//  and hand it a nonzero dt — manufacturing "no movement happened" ticks
//  that drag the whole speed average down. requestVideoFrameCallback fires
//  once per actual decoded video frame and hands back that frame's real
//  presentation time, which is what calcSpeed's dt should be built from.
// ─────────────────────────────────────────────────
const useRVFC = typeof video.requestVideoFrameCallback === 'function';

function startLoop() {
  if (useRVFC) video.requestVideoFrameCallback(tick);
  else requestAnimationFrame(() => tick(performance.now(), null));
}

function tick(now, metadata) {
  const frameTime = metadata && typeof metadata.presentationTime === 'number'
    ? metadata.presentationTime
    : now;
  if (video.readyState>=2 && state!==S.SETUP) processFrame(frameTime);
  if (useRVFC) video.requestVideoFrameCallback(tick);
  else requestAnimationFrame(() => tick(performance.now(), null));
}

// ─────────────────────────────────────────────────
//  TAP HANDLING — cursor follows finger on setup screen
// ─────────────────────────────────────────────────
function getEventPos(e) {
  const t = e.touches ? e.touches[0] : e;
  return { x: t.clientX, y: t.clientY };
}

tapScreen.addEventListener('touchmove', e => {
  e.preventDefault();
  const {x,y} = getEventPos(e);
  cursorEl.style.display = 'block';
  cursorEl.style.left = x + 'px';
  cursorEl.style.top  = y + 'px';
}, { passive:false });

tapScreen.addEventListener('touchend',  e => { cursorEl.style.display='none'; handleTap(e); });
tapScreen.addEventListener('click',     e => handleTap(e));

function handleTap(e) {
  const {x,y} = getEventPos(e);
  sampleBallColor(x, y);
}

function sampleBallColor(screenX, screenY) {
  if (video.readyState < 2) return;

  // Map screen → canvas coordinates
  const rect   = video.getBoundingClientRect();
  const scaleX = canvas.width  / rect.width;
  const scaleY = canvas.height / rect.height;
  const cx     = Math.round((screenX - rect.left) * scaleX);
  const cy     = Math.round((screenY - rect.top)  * scaleY);

  // Draw current frame to canvas so we can sample it
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  // Sample 16×16 region around tap, take median-ish (trimmed mean)
  const radius = 8;
  const x0 = Math.max(0, cx - radius);
  const y0 = Math.max(0, cy - radius);
  const x1 = Math.min(canvas.width,  cx + radius);
  const y1 = Math.min(canvas.height, cy + radius);
  const region = ctx.getImageData(x0, y0, x1-x0, y1-y0);

  // Collect all pixel brightnesses, keep top 40% (the ball centre, not edges)
  const pixels = [];
  for (let i=0; i<region.data.length; i+=4) {
    const r=region.data[i], g=region.data[i+1], b=region.data[i+2];
    const lum=(r*77+g*150+b*29)>>8;
    pixels.push({ r, g, b, lum });
  }
  pixels.sort((a,b)=>b.lum-a.lum);
  const keep = pixels.slice(0, Math.max(4, Math.floor(pixels.length*0.4)));
  const rAvg = keep.reduce((s,p)=>s+p.r,0)/keep.length;
  const gAvg = keep.reduce((s,p)=>s+p.g,0)/keep.length;
  const bAvg = keep.reduce((s,p)=>s+p.b,0)/keep.length;

  targetColor = { r:rAvg, g:gAvg, b:bAvg };

  // Anchor the localized search on the tap point; we don't have a diameter
  // estimate yet so the first search uses the wider INITIAL_SEARCH_RADIUS.
  trackX = cx; trackY = cy; trackVX = 0; trackVY = 0; trackDiam = null; missStreak = 0; diamHistory = [];

  // Switch to scanning
  tapScreen.classList.add('hidden');
  state = S.SCANNING;
  stillCount = 0; armBall = null;
  setStatus('Looking for ball…');
}

// ─────────────────────────────────────────────────
//  BALL DETECTION — localized connected-component (flood-fill)
//
//  Only scans a small window around the ball's last known position, and
//  only accepts pixels that are actually CONNECTED to each other. A global
//  color threshold (the old approach) will happily fuse the ball with any
//  disconnected patch of similar color anywhere in the frame — that's what
//  was making the detection ring read 7-10x too large, which fed directly
//  into pxPerFoot and made every speed reading come out far too low.
// ─────────────────────────────────────────────────
function detectBallLocalized(data, w, h, cx, cy, radius, frameTime, moving) {
  if (!targetColor) return null;
  const { r:tr, g:tg, b:tb } = targetColor;

  const wx0 = Math.max(0, Math.floor(cx - radius));
  const wy0 = Math.max(0, Math.floor(cy - radius));
  const wx1 = Math.min(w - 1, Math.ceil(cx + radius));
  const wy1 = Math.min(h - 1, Math.ceil(cy + radius));
  const winW = wx1 - wx0 + 1, winH = wy1 - wy0 + 1;
  if (winW <= 0 || winH <= 0) return null;

  const total = winW * winH;
  if (total > MAX_WIN_TOTAL) return null; // safety guard, shouldn't happen given radius cap

  // While the ball is moving, motion blur smears its color across a wider
  // band at the edges — a real physical effect, not the same thing as
  // still-frame anti-aliasing. A stricter match window designed for a sharp
  // resting ball rejects too much of a blurred one, which is what was
  // capping accurate readings at low speed: faster putts blur more, so they
  // got filtered out hardest. Relax the tolerance while tracking motion.
  const tol = moving ? TOLERANCE * MOTION_TOLERANCE_MULT : TOLERANCE;
  const tolSq = tol * tol;
  for (let ly=0; ly<winH; ly++) {
    const gy = wy0 + ly;
    const rowBase = ly*winW;
    for (let lx=0; lx<winW; lx++) {
      const gx = wx0 + lx;
      const p = (gy*w + gx) << 2;
      const dr=data[p]-tr, dg=data[p+1]-tg, db=data[p+2]-tb;
      matchBuf[rowBase+lx] = (dr*dr+dg*dg+db*db < tolSq) ? 1 : 0;
    }
  }

  // Erosion only applies to the STILL calibration phase. It strips the
  // anti-aliased fringe of a sharp resting ball, which is correct there.
  // But a moving, blurred ball doesn't have that same thin fringe — it has
  // a genuinely soft, wide edge — and eroding that can shrink or destroy
  // the blob entirely, which is what was killing detections (and therefore
  // valid speed samples) specifically on the faster, more-blurred putts.
  // During motion we skip erosion and flood-fill the raw match mask.
  let fillBuf;
  let diamCompensate = 0;
  if (moving) {
    fillBuf = matchBuf;
  } else {
    for (let ly=0; ly<winH; ly++) {
      const rowBase = ly*winW;
      for (let lx=0; lx<winW; lx++) {
        const idx = rowBase+lx;
        if (!matchBuf[idx]) { erodeBuf[idx]=0; continue; }
        const left  = lx>0        ? matchBuf[idx-1]     : 0;
        const right = lx<winW-1   ? matchBuf[idx+1]     : 0;
        const up    = ly>0        ? matchBuf[idx-winW]  : 0;
        const down  = ly<winH-1   ? matchBuf[idx+winW]  : 0;
        erodeBuf[idx] = (left&&right&&up&&down) ? 1 : 0;
      }
    }
    fillBuf = erodeBuf;
    diamCompensate = ERODE_COMPENSATE;
  }
  visitedBuf.fill(0, 0, total);

  let bestCount=0, bestSumX=0, bestSumY=0, bestMinX=0, bestMaxX=0, bestMinY=0, bestMaxY=0;
  const maxComponentPix = total * MAX_COMPONENT_FRAC;

  for (let ly=0; ly<winH; ly++) {
    for (let lx=0; lx<winW; lx++) {
      const idx = ly*winW + lx;
      if (!fillBuf[idx] || visitedBuf[idx]) continue;

      // BFS flood fill from this seed
      let head=0, tail=0;
      qxBuf[tail]=lx; qyBuf[tail]=ly; tail++;
      visitedBuf[idx]=1;
      let count=0, sumX=0, sumY=0;
      let minX=lx, maxX=lx, minY=ly, maxY=ly;

      while (head<tail) {
        const px=qxBuf[head], py=qyBuf[head]; head++;
        count++; sumX+=px; sumY+=py;
        if (px<minX) minX=px; if (px>maxX) maxX=px;
        if (py<minY) minY=py; if (py>maxY) maxY=py;

        // 4-connectivity
        if (px>0) { const ni=py*winW+(px-1); if (fillBuf[ni]&&!visitedBuf[ni]) { visitedBuf[ni]=1; qxBuf[tail]=px-1; qyBuf[tail]=py; tail++; } }
        if (px<winW-1) { const ni=py*winW+(px+1); if (fillBuf[ni]&&!visitedBuf[ni]) { visitedBuf[ni]=1; qxBuf[tail]=px+1; qyBuf[tail]=py; tail++; } }
        if (py>0) { const ni=(py-1)*winW+px; if (fillBuf[ni]&&!visitedBuf[ni]) { visitedBuf[ni]=1; qxBuf[tail]=px; qyBuf[tail]=py-1; tail++; } }
        if (py<winH-1) { const ni=(py+1)*winW+px; if (fillBuf[ni]&&!visitedBuf[ni]) { visitedBuf[ni]=1; qxBuf[tail]=px; qyBuf[tail]=py+1; tail++; } }
      }

      // Reject components too small to trust, or so large they're almost
      // certainly background bleed rather than the ball itself
      if (count>=MIN_PIX && count<=maxComponentPix && count>bestCount) {
        bestCount=count; bestSumX=sumX; bestSumY=sumY;
        bestMinX=minX; bestMaxX=maxX; bestMinY=minY; bestMaxY=maxY;
      }
    }
  }

  if (bestCount===0) return null;

  const diam = Math.max(bestMaxX-bestMinX, bestMaxY-bestMinY) + 1 + diamCompensate;
  if (diam<MIN_DIAM || diam>MAX_DIAM) return null;

  const gx = wx0 + bestSumX/bestCount;
  const gy = wy0 + bestSumY/bestCount;
  const gMinX=wx0+bestMinX, gMaxX=wx0+bestMaxX, gMinY=wy0+bestMinY, gMaxY=wy0+bestMaxY;
  const edgeClipped = (gMinX<=EDGE_MARGIN || gMaxX>=w-EDGE_MARGIN || gMinY<=EDGE_MARGIN || gMaxY>=h-EDGE_MARGIN);

  return { x:gx, y:gy, diam, t:frameTime, edgeClipped };
}

function median(arr) {
  const s = arr.slice().sort((a,b)=>a-b);
  const m = Math.floor(s.length/2);
  return s.length%2===0 ? (s[m-1]+s[m])/2 : s[m];
}

// ─────────────────────────────────────────────────
//  RING
// ─────────────────────────────────────────────────
function showRing(ball) {
  if (!ball) { ringEl.style.display='none'; return; }
  // object-fit:cover scales the video by ONE uniform factor (the larger of
  // the two axis ratios) then center-crops the overflow. Mapping x and y
  // with independently-computed ratios (as before) drifts the ring off the
  // ball whenever the camera feed's aspect ratio doesn't match the screen's.
  const scale = Math.max(window.innerWidth/canvas.width, window.innerHeight/canvas.height);
  const offX  = (window.innerWidth  - canvas.width  * scale) / 2;
  const offY  = (window.innerHeight - canvas.height * scale) / 2;
  ringEl.style.cssText=`
    display:block;
    left:${ball.x*scale + offX}px;
    top:${ball.y*scale + offY}px;
    width:${ball.diam*scale}px;
    height:${ball.diam*scale}px;
  `;
}

// ─────────────────────────────────────────────────
//  SPEED
//
//  A putt decelerates continuously from friction the instant it leaves the
//  putter face — this was confirmed against real recorded footage: a single
//  putt measured ~7.4 ft/s right after contact and ~6.3 ft/s about 140ms
//  later, a real ~15% drop, not measurement noise. There is no single "true
//  speed" for a putt over an extended window — only where along that decay
//  curve you choose to measure. mFrames is capped at MAX_FRAMES (6) for
//  exactly this reason: it anchors the reading to the first few frames
//  right after motion is detected, closest to true contact speed, rather
//  than averaging across a longer window that would drift down the decay
//  curve and vary putt-to-putt depending on incidental timing.
//
//  Frame pairs where either end is edge-clipped are excluded — a clipped
//  blob's centroid is pulled toward its visible side, which reads as
//  phantom motion unrelated to the ball's real speed.
// ─────────────────────────────────────────────────
function calcSpeed(frames) {
  if (frames.length<MIN_FRAMES||!pxPerFoot) return null;
  const vels=[];
  for (let i=1;i<frames.length;i++) {
    const a=frames[i-1],b=frames[i];
    if (a.edgeClipped||b.edgeClipped) continue;
    const dist=Math.hypot(b.x-a.x,b.y-a.y);
    const dt=(b.t-a.t)/1000;
    if (dt>0.003&&dt<0.12) vels.push((dist/pxPerFoot)/dt);
  }
  if (!vels.length) return null;
  vels.sort((a,b)=>a-b);
  const m=Math.floor(vels.length/2);
  return vels.length%2===0?(vels[m-1]+vels[m])/2:vels[m];
}

// ─────────────────────────────────────────────────
//  DISPLAY
// ─────────────────────────────────────────────────
function showSpeed(fps) {
  lastSpeed=fps;
  numEl.textContent=fps.toFixed(1);
  dispEl.classList.add('visible');
  if (voiceOn) {
    try {
      speechSynthesis.cancel();
      const u=new SpeechSynthesisUtterance(fps.toFixed(1));
      u.rate=0.9; speechSynthesis.speak(u);
    } catch(e){}
  }
}

function setStatus(txt,cls='') {
  statusEl.textContent=txt;
  statusEl.className=cls;
}

function recordSpeed(fps) {
  speedHistory.unshift(fps);
  if (speedHistory.length>10) speedHistory.pop();
  renderHistory();
}

function renderHistory() {
  historyEl.innerHTML = speedHistory.map(v=>`<div class="hist-item">${v.toFixed(1)}</div>`).join('');
}

// ─────────────────────────────────────────────────
//  FINALIZE
// ─────────────────────────────────────────────────
function finalize() {
  const spd=calcSpeed(mFrames);
  mFrames=[];
  if (spd!==null&&spd>0.3&&spd<38) {
    state=S.DISPLAY;
    showSpeed(spd); showRing(null); setStatus('');
    recordSpeed(spd);
    clearTimeout(displayTmr);
    displayTmr=setTimeout(()=>{
      dispEl.classList.remove('visible');
      state=S.SCANNING; stillCount=0; armBall=null; diamHistory=[];
      setStatus('Looking for ball…');
    }, DISPLAY_MS);
  } else {
    state=S.SCANNING; stillCount=0; armBall=null; diamHistory=[];
    setStatus('Looking for ball…'); showRing(null);
  }
}

// ─────────────────────────────────────────────────
//  MAIN LOOP — called once per real camera frame via tick()
// ─────────────────────────────────────────────────
function processFrame(frameTime) {
  ctx.drawImage(video,0,0,canvas.width,canvas.height);
  const {data}=ctx.getImageData(0,0,canvas.width,canvas.height);

  // Search around where the ball is PREDICTED to be now (last position +
  // last velocity), not where it WAS last frame. The previous version
  // always centered the window on the stale last-known position, so the
  // window only had a chance of catching the ball if its per-frame
  // displacement was smaller than the radius — on a fast putt that's false
  // almost immediately after contact, and once lost, the window kept
  // growing around a point the ball had already moved well past. This is
  // why fast putts silently lost tracking a frame or two after contact and
  // reported only whatever tiny, noisy shift happened right at contact —
  // low regardless of how hard the ball was actually hit.
  const predX = Math.max(0, Math.min(canvas.width-1,  trackX + trackVX));
  const predY = Math.max(0, Math.min(canvas.height-1, trackY + trackVY));

  // Because the window now follows the predicted position, it only needs
  // to cover the ERROR in a constant-velocity guess (deceleration + noise)
  // — not the full raw displacement — so it can stay modest even for fast
  // putts. VELOCITY_MARGIN_PX only kicks in once actually moving.
  const speedMag = Math.hypot(trackVX, trackVY);
  let radius = trackDiam
    ? Math.max(MIN_SEARCH_RADIUS, trackDiam*SEARCH_MARGIN_MULT) + (speedMag>0 ? VELOCITY_MARGIN_PX : 0)
    : INITIAL_SEARCH_RADIUS;
  radius = Math.min(MAX_SEARCH_RADIUS, radius * (1+missStreak*0.5));
  if (missStreak > MAX_MISS_BEFORE_RESET) { radius = MAX_SEARCH_RADIUS; trackDiam = null; trackVX = 0; trackVY = 0; }

  // Only the SCANNING phase expects a still, resting ball (that's when we
  // calibrate pxPerFoot off a sharp edge). ARMED and MEASURING may involve
  // real motion blur, so they use the relaxed/no-erosion detection path.
  const moving = state !== S.SCANNING;
  const ball = detectBallLocalized(data, canvas.width, canvas.height, predX, predY, radius, frameTime, moving);
  if (ball) {
    // Real per-frame velocity, measured from the last CONFIRMED position
    // (not the prediction), so it reflects what the ball actually did.
    trackVX = ball.x - trackX;
    trackVY = ball.y - trackY;
    trackX = ball.x; trackY = ball.y; trackDiam = ball.diam; missStreak = 0;
  } else {
    // Coast forward on the last known velocity rather than freezing in
    // place — keeps the predicted search center advancing with the ball
    // through a brief miss (blur, occlusion) instead of falling behind it.
    trackX = predX; trackY = predY;
    missStreak++;
  }

  switch(state) {

    case S.SCANNING: {
      showRing(ball);
      if (!ball) { stillCount=0; armBall=null; diamHistory=[]; setStatus('Looking for ball…'); break; }
      setStatus('Ball found — hold still','found');
      if (!armBall) { armBall=ball; stillCount=0; diamHistory=[]; break; }
      const mv=Math.hypot(ball.x-armBall.x,ball.y-armBall.y);
      if (mv<MOVE_PX) {
        stillCount++;
        armBall=ball;
        if (!ball.edgeClipped) diamHistory.push(ball.diam);
      } else { stillCount=0; armBall=ball; diamHistory=[]; }
      if (stillCount>=STILL_N) {
        // Median over the whole stable window, not a single frame's
        // reading — one noisy frame can no longer set a bad calibration.
        if (diamHistory.length) pxPerFoot=(median(diamHistory)/BALL_IN)*12;
        else if (!ball.edgeClipped) pxPerFoot=(ball.diam/BALL_IN)*12;
        state=S.ARMED; setStatus('Ready','ready');
      }
      break;
    }

    case S.ARMED: {
      showRing(ball);
      if (!ball) {
        stillCount--;
        if (stillCount<-10) { state=S.SCANNING; stillCount=0; armBall=null; diamHistory=[]; setStatus('Looking for ball…'); }
        break;
      }
      if (Math.hypot(ball.x-armBall.x,ball.y-armBall.y)>MOVE_PX) {
        state=S.MEASURING; mFrames=[armBall,ball];
        setStatus('Reading…','reading'); showRing(null);
      } else { armBall=ball; }
      break;
    }

    case S.MEASURING: {
      if (ball) {
        mFrames.push(ball);
        if (mFrames.length>=MAX_FRAMES) finalize();
      } else {
        mFrames.length>=MIN_FRAMES?finalize():(()=>{
          state=S.SCANNING; stillCount=0; armBall=null; diamHistory=[];
          setStatus('Looking for ball…'); showRing(null);
        })();
      }
      break;
    }

    case S.DISPLAY: break;
  }
}

// ─────────────────────────────────────────────────
//  CONTROLS
// ─────────────────────────────────────────────────
function toggleVoice() {
  voiceOn=!voiceOn;
  voiceBtn.textContent=voiceOn?'Voice On':'Voice Off';
  voiceBtn.classList.toggle('on',voiceOn);
  if (voiceOn) speechSynthesis.speak(new SpeechSynthesisUtterance(''));
}

function retap() {
  targetColor=null; state=S.SETUP;
  stillCount=0; armBall=null; mFrames=[]; diamHistory=[];
  trackX=null; trackY=null; trackVX=0; trackVY=0; trackDiam=null; missStreak=0;
  tapScreen.classList.remove('hidden');
  showRing(null); dispEl.classList.remove('visible');
  clearTimeout(displayTmr);
}

startCamera();
</script>
