<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Putt Speed</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body {
      background:#000;
      font-family:'DM Sans',system-ui,sans-serif;
      color:#fff;
      width:100vw; height:100vh;
      overflow:hidden; position:fixed;
    }
    #video {
      position:absolute; inset:0;
      width:100%; height:100%;
      object-fit:cover; opacity:0.65;
    }
    #canvas { display:none; }

    /* ── tap-to-identify overlay ── */
    #tap-screen {
      position:absolute; inset:0; z-index:20;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      gap:20px;
      background:rgba(0,0,0,0.55);
      cursor:crosshair;
    }
    #tap-screen.hidden { display:none; }
    .tap-icon {
      width:64px; height:64px;
      border:2.5px solid rgba(255,218,0,0.85);
      border-radius:50%;
      display:flex; align-items:center; justify-content:center;
    }
    .tap-icon::after {
      content:''; width:8px; height:8px;
      background:rgba(255,218,0,0.9); border-radius:50%;
    }
    .tap-title {
      font-size:20px; font-weight:600;
      color:#fff; letter-spacing:-.01em;
    }
    .tap-sub {
      font-size:13px; color:rgba(255,255,255,0.45);
      text-align:center; max-width:240px; line-height:1.6;
    }

    /* ── crosshair cursor follows finger ── */
    #cursor {
      position:absolute;
      width:48px; height:48px;
      border:2px solid rgba(255,218,0,0.8);
      border-radius:50%;
      transform:translate(-50%,-50%);
      pointer-events:none;
      display:none;
    }
    #cursor::after {
      content:''; position:absolute;
      top:50%; left:50%; transform:translate(-50%,-50%);
      width:6px; height:6px;
      background:rgba(255,218,0,.9); border-radius:50%;
    }

    /* ── main overlay ── */
    #overlay {
      position:absolute; inset:0;
      display:flex; flex-direction:column;
      align-items:center; justify-content:space-between;
      padding: max(env(safe-area-inset-top),32px) 24px max(env(safe-area-inset-bottom),28px);
      pointer-events:none;
    }

    #status-wrap { display:flex; flex-direction:column; align-items:center; gap:8px; }
    #app-label { font-size:10px; letter-spacing:.18em; text-transform:uppercase; color:rgba(255,255,255,.28); }
    #status {
      font-size:12px; letter-spacing:.1em; text-transform:uppercase;
      color:rgba(255,255,255,.4);
      background:rgba(0,0,0,.45);
      padding:7px 20px; border-radius:30px;
      border:1px solid rgba(255,255,255,.12);
      transition:color .2s, border-color .2s;
    }
    #status.found   { color:rgba(255,210,0,.9);  border-color:rgba(255,210,0,.4); }
    #status.ready   { color:rgba(255,255,255,.9); border-color:rgba(255,255,255,.5); }
    #status.reading { color:#fff;                 border-color:#fff; }

    #speed-display {
      text-align:center;
      opacity:0; transform:scale(.93);
      transition:opacity .13s ease, transform .13s ease;
      pointer-events:none;
    }
    #speed-display.visible { opacity:1; transform:scale(1); }
    #speed-number {
      font-size:clamp(84px,23vw,124px);
      font-weight:700; letter-spacing:-.05em; line-height:1;
      color:#fff; text-shadow:0 2px 40px rgba(0,0,0,.9);
    }
    #speed-unit {
      font-size:12px; font-weight:400;
      letter-spacing:.16em; text-transform:uppercase;
      color:rgba(255,255,255,.4); margin-top:10px;
    }

    #controls {
      display:flex; gap:10px;
      justify-content:center; flex-wrap:wrap;
      pointer-events:all;
    }
    .btn {
      font-family:inherit; font-size:11px;
      letter-spacing:.09em; text-transform:uppercase;
      color:rgba(255,255,255,.45);
      background:rgba(0,0,0,.4);
      border:1.5px solid rgba(255,255,255,.15);
      border-radius:6px; padding:10px 18px; cursor:pointer;
    }
    .btn.on { color:#fff; border-color:rgba(255,255,255,.55); background:rgba(255,255,255,.1); }

    /* ── ball ring ── */
    #ring {
      position:absolute;
      border:3px solid rgba(255,218,0,.9);
      border-radius:50%;
      transform:translate(-50%,-50%);
      pointer-events:none; display:none;
      box-shadow:0 0 0 1px rgba(0,0,0,.4), 0 0 16px rgba(255,218,0,.5);
    }

    #error-msg {
      position:absolute; inset:0; display:none;
      align-items:center; justify-content:center;
      flex-direction:column; gap:14px; text-align:center; padding:32px;
      background:rgba(0,0,0,.88);
    }
    #error-msg.show { display:flex; }
    #error-msg h2 { font-size:20px; font-weight:600; }
    #error-msg p  { font-size:14px; color:rgba(255,255,255,.5); line-height:1.55; }
  </style>
</head>
<body>

<video id="video" playsinline autoplay muted></video>
<canvas id="canvas"></canvas>
<div id="cursor"></div>

<!-- Tap to identify screen -->
<div id="tap-screen">
  <div class="tap-icon"></div>
  <div class="tap-title">Tap the ball</div>
  <div class="tap-sub">Touch the ball in the camera view to lock it in</div>
</div>

<div id="ring"></div>

<div id="overlay">
  <div id="status-wrap">
    <div id="app-label">Putt Speed</div>
    <div id="status">Looking for ball…</div>
  </div>
  <div id="speed-display">
    <div id="speed-number">0.0</div>
    <div id="speed-unit">ft / sec</div>
  </div>
  <div id="controls">
    <button class="btn on" id="voice-btn" onclick="toggleVoice()">Voice On</button>
    <button class="btn"    id="unit-btn"  onclick="toggleUnit()">mph</button>
    <button class="btn"                   onclick="retap()">Re-tap Ball</button>
  </div>
</div>

<div id="error-msg">
  <h2>Camera unavailable</h2>
  <p>Allow camera access in your browser settings and reload.</p>
</div>

<script>
// ─────────────────────────────────────────────────
//  CONSTANTS
// ─────────────────────────────────────────────────
const BALL_IN    = 1.68;  // USGA diameter, inches
const STRIDE     = 3;     // scan every Nth pixel
const TOLERANCE  = 52;    // Euclidean RGB distance for color match
const MIN_PIX    = 10;    // min matching sampled pixels for a valid blob
const MIN_DIAM   = 14;    // px
const MAX_DIAM   = 420;   // px
const STILL_N    = 22;    // frames stable to arm
const MOVE_PX    = 9;     // centroid shift to trigger measuring
const MIN_FRAMES = 3;
const MAX_FRAMES = 10;
const DISPLAY_MS = 4200;

// ─────────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────────
const S = { SETUP:0, SCANNING:1, ARMED:2, MEASURING:3, DISPLAY:4 };
let state      = S.SETUP;
let targetColor= null;   // { r, g, b } from tap
let stillCount = 0;
let armBall    = null;
let mFrames    = [];
let pxPerFoot  = null;
let displayTmr = null;
let lastSpeed  = null;
let voiceOn    = true;
let showMph    = false;

// ─────────────────────────────────────────────────
//  DOM
// ─────────────────────────────────────────────────
const video     = document.getElementById('video');
const canvas    = document.getElementById('canvas');
const ctx       = canvas.getContext('2d', { willReadFrequently:true });
const tapScreen = document.getElementById('tap-screen');
const cursorEl  = document.getElementById('cursor');
const statusEl  = document.getElementById('status');
const dispEl    = document.getElementById('speed-display');
const numEl     = document.getElementById('speed-number');
const unitEl    = document.getElementById('speed-unit');
const ringEl    = document.getElementById('ring');
const voiceBtn  = document.getElementById('voice-btn');
const unitBtn   = document.getElementById('unit-btn');
const errMsg    = document.getElementById('error-msg');

// ─────────────────────────────────────────────────
//  CAMERA
// ─────────────────────────────────────────────────
async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:'user', width:{ideal:1280}, height:{ideal:720}, frameRate:{ideal:60,min:30} },
      audio:false
    });
    video.srcObject = stream;
    video.addEventListener('loadedmetadata', () => {
      canvas.width  = video.videoWidth;
      canvas.height = video.videoHeight;
      requestAnimationFrame(loop);
    });
  } catch(e) { errMsg.classList.add('show'); }
}

// ─────────────────────────────────────────────────
//  TAP HANDLING — cursor follows finger on setup screen
// ─────────────────────────────────────────────────
function getEventPos(e) {
  const t = e.touches ? e.touches[0] : e;
  return { x: t.clientX, y: t.clientY };
}

tapScreen.addEventListener('touchmove', e => {
  e.preventDefault();
  const {x,y} = getEventPos(e);
  cursorEl.style.display = 'block';
  cursorEl.style.left = x + 'px';
  cursorEl.style.top  = y + 'px';
}, { passive:false });

tapScreen.addEventListener('touchend',  e => { cursorEl.style.display='none'; handleTap(e); });
tapScreen.addEventListener('click',     e => handleTap(e));

function handleTap(e) {
  const {x,y} = getEventPos(e);
  sampleBallColor(x, y);
}

function sampleBallColor(screenX, screenY) {
  if (video.readyState < 2) return;

  // Map screen → canvas coordinates
  const rect   = video.getBoundingClientRect();
  const scaleX = canvas.width  / rect.width;
  const scaleY = canvas.height / rect.height;
  const cx     = Math.round((screenX - rect.left) * scaleX);
  const cy     = Math.round((screenY - rect.top)  * scaleY);

  // Draw current frame to canvas so we can sample it
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  // Sample 16×16 region around tap, take median-ish (trimmed mean)
  const radius = 8;
  const x0 = Math.max(0, cx - radius);
  const y0 = Math.max(0, cy - radius);
  const x1 = Math.min(canvas.width,  cx + radius);
  const y1 = Math.min(canvas.height, cy + radius);
  const region = ctx.getImageData(x0, y0, x1-x0, y1-y0);

  // Collect all pixel brightnesses, keep top 40% (the ball centre, not edges)
  const pixels = [];
  for (let i=0; i<region.data.length; i+=4) {
    const r=region.data[i], g=region.data[i+1], b=region.data[i+2];
    const lum=(r*77+g*150+b*29)>>8;
    pixels.push({ r, g, b, lum });
  }
  pixels.sort((a,b)=>b.lum-a.lum);
  const keep = pixels.slice(0, Math.max(4, Math.floor(pixels.length*0.4)));
  const rAvg = keep.reduce((s,p)=>s+p.r,0)/keep.length;
  const gAvg = keep.reduce((s,p)=>s+p.g,0)/keep.length;
  const bAvg = keep.reduce((s,p)=>s+p.b,0)/keep.length;

  targetColor = { r:rAvg, g:gAvg, b:bAvg };

  // Switch to scanning
  tapScreen.classList.add('hidden');
  state = S.SCANNING;
  stillCount = 0; armBall = null;
  setStatus('Looking for ball…');
}

// ─────────────────────────────────────────────────
//  BALL DETECTION — color-match blob
// ─────────────────────────────────────────────────
function detectBall(data) {
  if (!targetColor) return null;
  const { r:tr, g:tg, b:tb } = targetColor;
  const w=canvas.width, h=canvas.height, s=STRIDE;

  // Pass 1 — find all matching pixels
  let sx=0,sy=0,n=0,x0=w,x1=0,y0=h,y1=0;
  for (let y=0;y<h;y+=s) {
    for (let x=0;x<w;x+=s) {
      const p=(y*w+x)<<2;
      const dr=data[p]-tr, dg=data[p+1]-tg, db=data[p+2]-tb;
      if (dr*dr+dg*dg+db*db < TOLERANCE*TOLERANCE) {
        sx+=x;sy+=y;n++;
        if(x<x0)x0=x;if(x>x1)x1=x;
        if(y<y0)y0=y;if(y>y1)y1=y;
      }
    }
  }
  if (n<MIN_PIX) return null;

  const diam1=Math.max(x1-x0,y1-y0);
  if (diam1<MIN_DIAM||diam1>MAX_DIAM) return null;

  const cx1=sx/n, cy1=sy/n;
  const maxR=diam1*0.85;

  // Pass 2 — restrict to pixels near rough centroid (isolates ball from matching floor patches)
  sx=0;sy=0;n=0;x0=w;x1=0;y0=h;y1=0;
  for (let y=0;y<h;y+=s) {
    for (let x=0;x<w;x+=s) {
      const p=(y*w+x)<<2;
      const dr=data[p]-tr, dg=data[p+1]-tg, db=data[p+2]-tb;
      if (dr*dr+dg*dg+db*db < TOLERANCE*TOLERANCE) {
        const dx=x-cx1, dy=y-cy1;
        if (dx*dx+dy*dy<=maxR*maxR) {
          sx+=x;sy+=y;n++;
          if(x<x0)x0=x;if(x>x1)x1=x;
          if(y<y0)y0=y;if(y>y1)y1=y;
        }
      }
    }
  }
  if (n<MIN_PIX) return null;

  const diam=Math.max(x1-x0,y1-y0);
  if (diam<MIN_DIAM||diam>MAX_DIAM) return null;

  return { x:sx/n, y:sy/n, diam, t:performance.now() };
}

// ─────────────────────────────────────────────────
//  RING
// ─────────────────────────────────────────────────
function showRing(ball) {
  if (!ball) { ringEl.style.display='none'; return; }
  const sx=window.innerWidth/canvas.width, sy=window.innerHeight/canvas.height;
  const sz=Math.max(sx,sy);
  ringEl.style.cssText=`
    display:block;
    left:${ball.x*sx}px;
    top:${ball.y*sy}px;
    width:${ball.diam*sz}px;
    height:${ball.diam*sz}px;
  `;
}

// ─────────────────────────────────────────────────
//  SPEED
// ─────────────────────────────────────────────────
function calcSpeed(frames) {
  if (frames.length<MIN_FRAMES||!pxPerFoot) return null;
  const use=frames.slice(0,MAX_FRAMES);
  const vels=[];
  for (let i=1;i<use.length;i++) {
    const a=use[i-1],b=use[i];
    const dist=Math.hypot(b.x-a.x,b.y-a.y);
    const dt=(b.t-a.t)/1000;
    if (dt>0.003&&dt<0.12) vels.push((dist/pxPerFoot)/dt);
  }
  if (!vels.length) return null;
  vels.sort((a,b)=>a-b);
  const m=Math.floor(vels.length/2);
  return vels.length%2===0?(vels[m-1]+vels[m])/2:vels[m];
}

// ─────────────────────────────────────────────────
//  DISPLAY
// ─────────────────────────────────────────────────
function showSpeed(fps) {
  lastSpeed=fps;
  const val=showMph?fps*0.6818:fps;
  numEl.textContent=val.toFixed(1);
  unitEl.textContent=showMph?'mph':'ft / sec';
  dispEl.classList.add('visible');
  if (voiceOn) {
    try {
      speechSynthesis.cancel();
      const u=new SpeechSynthesisUtterance(val.toFixed(1));
      u.rate=0.9; speechSynthesis.speak(u);
    } catch(e){}
  }
}

function setStatus(txt,cls='') {
  statusEl.textContent=txt;
  statusEl.className=cls;
}

// ─────────────────────────────────────────────────
//  FINALIZE
// ─────────────────────────────────────────────────
function finalize() {
  const spd=calcSpeed(mFrames);
  mFrames=[];
  if (spd!==null&&spd>0.3&&spd<38) {
    state=S.DISPLAY;
    showSpeed(spd); showRing(null); setStatus('');
    clearTimeout(displayTmr);
    displayTmr=setTimeout(()=>{
      dispEl.classList.remove('visible');
      state=S.SCANNING; stillCount=0; armBall=null;
      setStatus('Looking for ball…');
    }, DISPLAY_MS);
  } else {
    state=S.SCANNING; stillCount=0; armBall=null;
    setStatus('Looking for ball…'); showRing(null);
  }
}

// ─────────────────────────────────────────────────
//  MAIN LOOP
// ─────────────────────────────────────────────────
function loop() {
  requestAnimationFrame(loop);
  if (video.readyState<2||state===S.SETUP) return;

  ctx.drawImage(video,0,0,canvas.width,canvas.height);
  const {data}=ctx.getImageData(0,0,canvas.width,canvas.height);
  const ball=detectBall(data);

  switch(state) {

    case S.SCANNING: {
      showRing(ball);
      if (!ball) { stillCount=0; armBall=null; setStatus('Looking for ball…'); break; }
      setStatus('Ball found — hold still','found');
      if (!armBall) { armBall=ball; stillCount=0; break; }
      const mv=Math.hypot(ball.x-armBall.x,ball.y-armBall.y);
      if (mv<MOVE_PX) {
        stillCount++;
        armBall=ball;
        if (ball.diam>MIN_DIAM) pxPerFoot=(ball.diam/BALL_IN)*12;
      } else { stillCount=0; armBall=ball; }
      if (stillCount>=STILL_N) { state=S.ARMED; setStatus('Ready','ready'); }
      break;
    }

    case S.ARMED: {
      showRing(ball);
      if (!ball) {
        stillCount--;
        if (stillCount<-10) { state=S.SCANNING; stillCount=0; armBall=null; setStatus('Looking for ball…'); }
        break;
      }
      if (Math.hypot(ball.x-armBall.x,ball.y-armBall.y)>MOVE_PX) {
        state=S.MEASURING; mFrames=[armBall,ball];
        setStatus('Reading…','reading'); showRing(null);
      } else { armBall=ball; }
      break;
    }

    case S.MEASURING: {
      if (ball) {
        mFrames.push(ball);
        if (mFrames.length>=MAX_FRAMES) finalize();
      } else {
        mFrames.length>=MIN_FRAMES?finalize():(()=>{
          state=S.SCANNING; stillCount=0; armBall=null;
          setStatus('Looking for ball…'); showRing(null);
        })();
      }
      break;
    }

    case S.DISPLAY: break;
  }
}

// ─────────────────────────────────────────────────
//  CONTROLS
// ─────────────────────────────────────────────────
function toggleVoice() {
  voiceOn=!voiceOn;
  voiceBtn.textContent=voiceOn?'Voice On':'Voice Off';
  voiceBtn.classList.toggle('on',voiceOn);
  if (voiceOn) speechSynthesis.speak(new SpeechSynthesisUtterance(''));
}

function toggleUnit() {
  showMph=!showMph;
  unitBtn.textContent=showMph?'ft/s':'mph';
  unitBtn.classList.toggle('on',showMph);
  if (lastSpeed!==null) showSpeed(lastSpeed);
}

function retap() {
  targetColor=null; state=S.SETUP;
  stillCount=0; armBall=null; mFrames=[];
  tapScreen.classList.remove('hidden');
  showRing(null); dispEl.classList.remove('visible');
  clearTimeout(displayTmr);
}

startCamera();
</script>
</body>
</html>
