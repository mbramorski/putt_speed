<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Putt Speed</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      background: #000;
      font-family: 'DM Sans', system-ui, sans-serif;
      color: #fff;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      position: fixed;
    }

    #video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.6;
    }

    #canvas { display: none; }

    /* ── Setup screen ── */
    #setup-screen {
      position: absolute;
      inset: 0;
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 40px 32px;
      text-align: center;
      background: rgba(0,0,0,0.72);
    }
    #setup-screen.hidden { display: none; }

    .s-eyebrow {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
    }
    .s-heading {
      font-size: 22px;
      font-weight: 600;
      line-height: 1.3;
      color: #fff;
      max-width: 270px;
    }
    .s-body {
      font-size: 14px;
      color: rgba(255,255,255,0.45);
      max-width: 260px;
      line-height: 1.6;
    }
    #set-bg-btn {
      margin-top: 8px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      color: #000;
      background: #fff;
      border: none;
      border-radius: 10px;
      padding: 18px 48px;
      cursor: pointer;
      letter-spacing: 0.02em;
    }

    /* ── Main overlay ── */
    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: max(env(safe-area-inset-top), 32px) 24px max(env(safe-area-inset-bottom), 28px);
    }

    #status-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    #app-label {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.28);
    }
    #status {
      font-size: 11px;
      letter-spacing: 0.11em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      background: rgba(0,0,0,0.4);
      padding: 7px 20px;
      border-radius: 30px;
      border: 1px solid rgba(255,255,255,0.1);
      transition: color 0.2s, border-color 0.2s;
    }
    #status.armed  { color: rgba(255,255,255,0.9); border-color: rgba(255,255,255,0.4); }
    #status.measuring { color: #fff; border-color: rgba(255,255,255,0.7); }

    /* ── Big number ── */
    #speed-display {
      text-align: center;
      opacity: 0;
      transform: scale(0.93);
      transition: opacity 0.13s ease, transform 0.13s ease;
      pointer-events: none;
    }
    #speed-display.visible { opacity: 1; transform: scale(1); }
    #speed-number {
      font-size: clamp(84px, 23vw, 124px);
      font-weight: 700;
      letter-spacing: -0.05em;
      line-height: 1;
      color: #fff;
      text-shadow: 0 2px 40px rgba(0,0,0,0.9);
    }
    #speed-unit {
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      margin-top: 10px;
    }

    /* ── Controls ── */
    #controls {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn {
      font-family: inherit;
      font-size: 11px;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      background: rgba(0,0,0,0.38);
      border: 1.5px solid rgba(255,255,255,0.13);
      border-radius: 6px;
      padding: 10px 18px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn.on { color: #fff; border-color: rgba(255,255,255,0.5); background: rgba(255,255,255,0.1); }

    /* ── Ball ring ── */
    #ball-ring {
      position: absolute;
      border: 2px solid rgba(255, 218, 0, 0.85);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      display: none;
      box-shadow: 0 0 12px rgba(255,218,0,0.35);
    }

    /* ── Error ── */
    #error-msg {
      position: absolute; inset: 0;
      display: none; align-items: center; justify-content: center;
      flex-direction: column; gap: 14px; text-align: center; padding: 32px;
      background: rgba(0,0,0,0.85);
    }
    #error-msg.show { display: flex; }
    #error-msg h2 { font-size: 20px; font-weight: 600; }
    #error-msg p { font-size: 14px; color: rgba(255,255,255,0.5); line-height: 1.55; }
  </style>
</head>
<body>

<video id="video" playsinline autoplay muted></video>
<canvas id="canvas"></canvas>
<div id="ball-ring"></div>

<div id="setup-screen">
  <div class="s-eyebrow">Putt Speed — Setup</div>
  <div class="s-heading">Clear the floor under the camera</div>
  <div class="s-body">
    Remove the ball from view. Position the phone flat on the floor, screen facing you.
    Then tap to lock in the background.
  </div>
  <button id="set-bg-btn" onclick="captureBackground()">Set Background</button>
</div>

<div id="overlay">
  <div id="status-wrap">
    <div id="app-label">Putt Speed</div>
    <div id="status">Starting…</div>
  </div>

  <div id="speed-display">
    <div id="speed-number">0.0</div>
    <div id="speed-unit">ft / sec</div>
  </div>

  <div id="controls">
    <button class="btn on" id="voice-btn"  onclick="toggleVoice()">Voice On</button>
    <button class="btn"    id="unit-btn"   onclick="toggleUnit()">mph</button>
    <button class="btn"                    onclick="resetSetup()">Recalibrate</button>
  </div>
</div>

<div id="error-msg">
  <h2>Camera unavailable</h2>
  <p>Allow camera access in your browser settings and reload the page.</p>
</div>

<script>
// ═══════════════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════════════
const CFG = {
  BALL_IN     : 1.68,  // USGA ball diameter, inches
  DIFF_THRESH : 20,    // grayscale diff to count as foreground
  MIN_BLOB    : 16,    // min blob diameter px
  MAX_BLOB    : 400,   // max blob diameter px
  MIN_PIX     : 8,     // min sampled pixels for a valid blob
  STRIDE      : 3,     // scan every Nth pixel (perf vs resolution)
  STILL_N     : 20,    // stable frames before arming
  MOVE_PX     : 10,    // centroid shift to trigger measurement
  MIN_FRAMES  : 3,
  MAX_FRAMES  : 12,
  DISPLAY_MS  : 4200,
  SPD_MIN     : 0.3,   // ft/s sanity floor
  SPD_MAX     : 38,    // ft/s sanity ceiling
};

// ═══════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════
const S = { SETUP:0, WAIT_BALL:1, ARMED:2, MEASURING:3, DISPLAY:4 };
let state      = S.SETUP;
let bgGray     = null;   // Uint8Array — background snapshot
let pxPerFoot  = null;   // calibrated from ball diameter
let stillCount = 0;
let armBall    = null;
let mFrames    = [];
let displayTmr = null;
let lastSpeed  = null;
let voiceOn    = true;
let showMph    = false;

// ═══════════════════════════════════════════════════════════
//  DOM
// ═══════════════════════════════════════════════════════════
const video    = document.getElementById('video');
const canvas   = document.getElementById('canvas');
const ctx      = canvas.getContext('2d', { willReadFrequently: true });
const setupEl  = document.getElementById('setup-screen');
const statusEl = document.getElementById('status');
const dispEl   = document.getElementById('speed-display');
const numEl    = document.getElementById('speed-number');
const unitEl   = document.getElementById('speed-unit');
const ringEl   = document.getElementById('ball-ring');
const voiceBtn = document.getElementById('voice-btn');
const unitBtn  = document.getElementById('unit-btn');
const errMsg   = document.getElementById('error-msg');

// ═══════════════════════════════════════════════════════════
//  CAMERA
// ═══════════════════════════════════════════════════════════
async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode:'user', width:{ideal:1280}, height:{ideal:720}, frameRate:{ideal:60,min:30} },
      audio: false
    });
    video.srcObject = stream;
    video.addEventListener('loadedmetadata', () => {
      canvas.width  = video.videoWidth;
      canvas.height = video.videoHeight;
      requestAnimationFrame(loop);
    });
  } catch(e) { errMsg.classList.add('show'); }
}

// ═══════════════════════════════════════════════════════════
//  BACKGROUND CAPTURE  — called once at setup tap
// ═══════════════════════════════════════════════════════════
function captureBackground() {
  if (video.readyState < 2) return;
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
  const { data } = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const w = canvas.width, h = canvas.height;
  bgGray = new Uint8Array(w * h);
  for (let i = 0; i < w * h; i++) {
    const p = i * 4;
    bgGray[i] = (data[p]*77 + data[p+1]*150 + data[p+2]*29) >> 8;
  }
  setupEl.classList.add('hidden');
  state = S.WAIT_BALL;
  setStatus('Place ball in frame');
}

// ═══════════════════════════════════════════════════════════
//  BLOB DETECTION  — diff current frame against background
//  Returns {x, y, diam, t} of the largest changed region
// ═══════════════════════════════════════════════════════════
function findBlob(data) {
  const w = canvas.width, h = canvas.height, s = CFG.STRIDE;
  let sx=0, sy=0, n=0, x0=w, x1=0, y0=h, y1=0;

  for (let y = 0; y < h; y += s) {
    for (let x = 0; x < w; x += s) {
      const p = (y * w + x) * 4;
      const gray = (data[p]*77 + data[p+1]*150 + data[p+2]*29) >> 8;
      if (Math.abs(gray - bgGray[y * w + x]) > CFG.DIFF_THRESH) {
        sx += x; sy += y; n++;
        if (x < x0) x0=x; if (x > x1) x1=x;
        if (y < y0) y0=y; if (y > y1) y1=y;
      }
    }
  }

  if (n < CFG.MIN_PIX) return null;

  const diam = Math.max(x1-x0, y1-y0);
  if (diam < CFG.MIN_BLOB || diam > CFG.MAX_BLOB) return null;

  return { x: sx/n, y: sy/n, diam, t: performance.now() };
}

// ═══════════════════════════════════════════════════════════
//  SPEED CALCULATION  — median of per-frame velocities
// ═══════════════════════════════════════════════════════════
function calcSpeed(frames) {
  if (frames.length < CFG.MIN_FRAMES || !pxPerFoot) return null;
  const use = frames.slice(0, CFG.MAX_FRAMES);
  const vels = [];
  for (let i = 1; i < use.length; i++) {
    const a = use[i-1], b = use[i];
    const dist = Math.hypot(b.x-a.x, b.y-a.y);
    const dt   = (b.t - a.t) / 1000;
    if (dt > 0.003 && dt < 0.15) vels.push((dist / pxPerFoot) / dt);
  }
  if (!vels.length) return null;
  vels.sort((a,b)=>a-b);
  const m = Math.floor(vels.length/2);
  return vels.length%2===0 ? (vels[m-1]+vels[m])/2 : vels[m];
}

// ═══════════════════════════════════════════════════════════
//  DISPLAY
// ═══════════════════════════════════════════════════════════
function showSpeed(fps) {
  lastSpeed = fps;
  const val = showMph ? fps*0.6818 : fps;
  numEl.textContent  = val.toFixed(1);
  unitEl.textContent = showMph ? 'mph' : 'ft / sec';
  dispEl.classList.add('visible');
  if (voiceOn) {
    try {
      speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(val.toFixed(1));
      u.rate = 0.9; speechSynthesis.speak(u);
    } catch(e) {}
  }
}

function setStatus(txt, cls='') {
  statusEl.textContent = txt;
  statusEl.className = cls;
}

function updateRing(ball) {
  if (!ball) { ringEl.style.display='none'; return; }
  const sx = window.innerWidth/canvas.width, sy = window.innerHeight/canvas.height;
  ringEl.style.cssText = `display:block; left:${ball.x*sx}px; top:${ball.y*sy}px; width:${ball.diam*sx}px; height:${ball.diam*sy}px;`;
}

// ═══════════════════════════════════════════════════════════
//  FINALIZE  — speed measured, display result
// ═══════════════════════════════════════════════════════════
function finalize() {
  const speed = calcSpeed(mFrames);
  mFrames = [];
  if (speed !== null && speed > CFG.SPD_MIN && speed < CFG.SPD_MAX) {
    state = S.DISPLAY;
    showSpeed(speed);
    setStatus('');
    clearTimeout(displayTmr);
    displayTmr = setTimeout(() => {
      dispEl.classList.remove('visible');
      backToWait();
    }, CFG.DISPLAY_MS);
  } else {
    backToWait();
  }
}

function backToWait() {
  state = S.WAIT_BALL; stillCount=0; armBall=null; mFrames=[];
  setStatus('Place ball in frame'); updateRing(null);
}

// ═══════════════════════════════════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════════════════════════════════
function loop() {
  requestAnimationFrame(loop);
  if (video.readyState < 2 || !bgGray) return;

  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
  const { data } = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const blob = findBlob(data);

  switch (state) {

    case S.WAIT_BALL: {
      updateRing(blob);
      if (!blob) { stillCount=0; armBall=null; setStatus('Place ball in frame'); break; }

      // Calibrate px/foot from ball diameter
      if (blob.diam > CFG.MIN_BLOB) {
        pxPerFoot = (blob.diam / CFG.BALL_IN) * 12;
      }

      if (!armBall) { armBall=blob; stillCount=0; }
      const moved = Math.hypot(blob.x-armBall.x, blob.y-armBall.y);
      if (moved < CFG.MOVE_PX) {
        stillCount++;
        armBall = blob; // drift-correct resting position
        setStatus(stillCount > 6 ? 'Hold still…' : 'Place ball in frame');
      } else {
        stillCount=0; armBall=blob;
      }
      if (stillCount >= CFG.STILL_N) { state=S.ARMED; setStatus('Ready','armed'); }
      break;
    }

    case S.ARMED: {
      updateRing(blob);
      if (!blob) {
        stillCount--;
        if (stillCount < -10) backToWait();
        break;
      }
      if (Math.hypot(blob.x-armBall.x, blob.y-armBall.y) > CFG.MOVE_PX) {
        state=S.MEASURING; mFrames=[armBall, blob];
        setStatus('Measuring…','measuring'); updateRing(null);
      } else {
        armBall=blob;
      }
      break;
    }

    case S.MEASURING: {
      if (blob) {
        mFrames.push(blob);
        if (mFrames.length >= CFG.MAX_FRAMES) finalize();
      } else {
        mFrames.length >= CFG.MIN_FRAMES ? finalize() : backToWait();
      }
      break;
    }

    case S.DISPLAY: break;
  }
}

// ═══════════════════════════════════════════════════════════
//  CONTROLS
// ═══════════════════════════════════════════════════════════
function toggleVoice() {
  voiceOn = !voiceOn;
  voiceBtn.textContent = voiceOn ? 'Voice On' : 'Voice Off';
  voiceBtn.classList.toggle('on', voiceOn);
  if (voiceOn) speechSynthesis.speak(new SpeechSynthesisUtterance(''));
}

function toggleUnit() {
  showMph = !showMph;
  unitBtn.textContent = showMph ? 'ft/s' : 'mph';
  unitBtn.classList.toggle('on', showMph);
  if (lastSpeed !== null) showSpeed(lastSpeed);
}

function resetSetup() {
  bgGray=null; pxPerFoot=null; state=S.SETUP;
  stillCount=0; armBall=null; mFrames=[];
  setupEl.classList.remove('hidden');
  clearTimeout(displayTmr);
  dispEl.classList.remove('visible');
  updateRing(null);
}

startCamera();
</script>
</body>
</html>
