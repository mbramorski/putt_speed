<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Putt Speed</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body {
      background:#000;
      font-family:'DM Sans',system-ui,sans-serif;
      color:#fff;
      width:100vw; height:100vh;
      overflow:hidden; position:fixed;
    }
    #video {
      position:absolute; inset:0;
      width:100%; height:100%;
      object-fit:cover; opacity:0.6;
    }
    #canvas { display:none; }

    #overlay {
      position:absolute; inset:0;
      display:flex; flex-direction:column;
      align-items:center; justify-content:space-between;
      padding: max(env(safe-area-inset-top),32px) 24px max(env(safe-area-inset-bottom),28px);
    }

    /* status */
    #status-wrap { display:flex; flex-direction:column; align-items:center; gap:8px; }
    #app-label { font-size:10px; letter-spacing:.18em; text-transform:uppercase; color:rgba(255,255,255,.28); }
    #status {
      font-size:12px; letter-spacing:.1em; text-transform:uppercase;
      color:rgba(255,255,255,.4);
      background:rgba(0,0,0,.45);
      padding:7px 20px; border-radius:30px;
      border:1px solid rgba(255,255,255,.12);
      transition:color .2s, border-color .2s;
    }
    #status.found   { color:rgba(255,210,0,.9);  border-color:rgba(255,210,0,.4); }
    #status.ready   { color:rgba(255,255,255,.9); border-color:rgba(255,255,255,.5); }
    #status.reading { color:#fff;                 border-color:#fff; }

    /* big number */
    #speed-display {
      text-align:center;
      opacity:0; transform:scale(.93);
      transition:opacity .13s ease, transform .13s ease;
      pointer-events:none;
    }
    #speed-display.visible { opacity:1; transform:scale(1); }
    #speed-number {
      font-size:clamp(84px,23vw,124px);
      font-weight:700; letter-spacing:-.05em; line-height:1;
      color:#fff; text-shadow:0 2px 40px rgba(0,0,0,.9);
    }
    #speed-unit {
      font-size:12px; font-weight:400;
      letter-spacing:.16em; text-transform:uppercase;
      color:rgba(255,255,255,.4); margin-top:10px;
    }

    /* controls */
    #controls { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
    .btn {
      font-family:inherit; font-size:11px;
      letter-spacing:.09em; text-transform:uppercase;
      color:rgba(255,255,255,.45);
      background:rgba(0,0,0,.4);
      border:1.5px solid rgba(255,255,255,.15);
      border-radius:6px; padding:10px 18px; cursor:pointer;
      transition:all .15s;
    }
    .btn.on { color:#fff; border-color:rgba(255,255,255,.55); background:rgba(255,255,255,.1); }

    /* ball ring */
    #ring {
      position:absolute;
      border:3px solid rgba(255,218,0,.9);
      border-radius:50%;
      transform:translate(-50%,-50%);
      pointer-events:none;
      display:none;
      box-shadow:0 0 0 1px rgba(0,0,0,.4), 0 0 16px rgba(255,218,0,.5);
      transition: width .06s, height .06s, left .06s, top .06s;
    }

    /* error */
    #error-msg {
      position:absolute; inset:0; display:none;
      align-items:center; justify-content:center;
      flex-direction:column; gap:14px; text-align:center; padding:32px;
      background:rgba(0,0,0,.88);
    }
    #error-msg.show { display:flex; }
    #error-msg h2 { font-size:20px; font-weight:600; }
    #error-msg p  { font-size:14px; color:rgba(255,255,255,.5); line-height:1.55; }
  </style>
</head>
<body>

<video id="video" playsinline autoplay muted></video>
<canvas id="canvas"></canvas>
<div id="ring"></div>

<div id="overlay">
  <div id="status-wrap">
    <div id="app-label">Putt Speed</div>
    <div id="status">Looking for ball…</div>
  </div>

  <div id="speed-display">
    <div id="speed-number">0.0</div>
    <div id="speed-unit">ft / sec</div>
  </div>

  <div id="controls">
    <button class="btn on"  id="voice-btn" onclick="toggleVoice()">Voice On</button>
    <button class="btn"     id="unit-btn"  onclick="toggleUnit()">mph</button>
    <button class="btn on"  id="sens-btn"  onclick="cycleSens()">Indoor</button>
  </div>
</div>

<div id="error-msg">
  <h2>Camera unavailable</h2>
  <p>Allow camera access in your browser settings and reload.</p>
</div>

<script>
// ─────────────────────────────────────────────────
//  SENSITIVITY PRESETS
// ─────────────────────────────────────────────────
const SENS = [
  { label:'Indoor',  lum:118, sat:75 },
  { label:'Mixed',   lum:140, sat:60 },
  { label:'Outdoor', lum:162, sat:48 },
];
let sensIdx = 0;

function getLum() { return SENS[sensIdx].lum; }
function getSat() { return SENS[sensIdx].sat; }

// ─────────────────────────────────────────────────
//  CONFIG
// ─────────────────────────────────────────────────
const BALL_IN    = 1.68;   // USGA diameter
const STRIDE     = 3;      // scan every Nth pixel
const MIN_PIX    = 12;     // min qualifying pixels for a valid blob
const MIN_DIAM   = 18;     // px
const MAX_DIAM   = 380;    // px
const STILL_N    = 20;     // frames stable → arm
const MOVE_PX    = 8;      // centroid shift → motion
const MIN_FRAMES = 3;
const MAX_FRAMES = 10;
const DISPLAY_MS = 4200;

// ─────────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────────
const S = { SCANNING:0, ARMED:1, MEASURING:2, DISPLAY:3 };
let state      = S.SCANNING;
let stillCount = 0;
let armBall    = null;
let mFrames    = [];
let pxPerFoot  = null;
let displayTmr = null;
let lastSpeed  = null;
let voiceOn    = true;
let showMph    = false;

// ─────────────────────────────────────────────────
//  DOM
// ─────────────────────────────────────────────────
const video    = document.getElementById('video');
const canvas   = document.getElementById('canvas');
const ctx      = canvas.getContext('2d', { willReadFrequently:true });
const statusEl = document.getElementById('status');
const dispEl   = document.getElementById('speed-display');
const numEl    = document.getElementById('speed-number');
const unitEl   = document.getElementById('speed-unit');
const ringEl   = document.getElementById('ring');
const voiceBtn = document.getElementById('voice-btn');
const unitBtn  = document.getElementById('unit-btn');
const sensBtn  = document.getElementById('sens-btn');
const errMsg   = document.getElementById('error-msg');

// ─────────────────────────────────────────────────
//  CAMERA
// ─────────────────────────────────────────────────
async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:'user', width:{ideal:1280}, height:{ideal:720}, frameRate:{ideal:60,min:30} },
      audio:false
    });
    video.srcObject = stream;
    video.addEventListener('loadedmetadata', () => {
      canvas.width  = video.videoWidth;
      canvas.height = video.videoHeight;
      requestAnimationFrame(loop);
    });
  } catch(e) { errMsg.classList.add('show'); }
}

// ─────────────────────────────────────────────────
//  BALL DETECTION  — two-pass white blob finder
// ─────────────────────────────────────────────────
function detectBall(data) {
  const w = canvas.width, h = canvas.height;
  const s = STRIDE;
  const LUM = getLum(), SAT = getSat();

  // Pass 1 — rough centroid of all qualifying pixels
  let sx=0,sy=0,n=0,x0=w,x1=0,y0=h,y1=0;
  for (let y=0;y<h;y+=s) {
    for (let x=0;x<w;x+=s) {
      const p=(y*w+x)<<2;
      const r=data[p],g=data[p+1],b=data[p+2];
      const lum=(r*77+g*150+b*29)>>8;
      const sat=Math.max(r,g,b)-Math.min(r,g,b);
      if (lum>LUM && sat<SAT) {
        sx+=x;sy+=y;n++;
        if(x<x0)x0=x;if(x>x1)x1=x;
        if(y<y0)y0=y;if(y>y1)y1=y;
      }
    }
  }
  if (n<MIN_PIX) return null;

  const diam1=Math.max(x1-x0,y1-y0);
  if (diam1<MIN_DIAM||diam1>MAX_DIAM) return null;

  const cx1=sx/n, cy1=sy/n;
  const maxR=diam1*0.9;

  // Pass 2 — refine: keep only pixels near rough centroid
  sx=0;sy=0;n=0;x0=w;x1=0;y0=h;y1=0;
  for (let y=0;y<h;y+=s) {
    for (let x=0;x<w;x+=s) {
      const p=(y*w+x)<<2;
      const r=data[p],g=data[p+1],b=data[p+2];
      const lum=(r*77+g*150+b*29)>>8;
      const sat=Math.max(r,g,b)-Math.min(r,g,b);
      if (lum>LUM && sat<SAT) {
        const dx=x-cx1,dy=y-cy1;
        if (Math.sqrt(dx*dx+dy*dy)<=maxR) {
          sx+=x;sy+=y;n++;
          if(x<x0)x0=x;if(x>x1)x1=x;
          if(y<y0)y0=y;if(y>y1)y1=y;
        }
      }
    }
  }
  if (n<MIN_PIX) return null;

  const diam=Math.max(x1-x0,y1-y0);
  if (diam<MIN_DIAM||diam>MAX_DIAM) return null;

  return { x:sx/n, y:sy/n, diam, t:performance.now() };
}

// ─────────────────────────────────────────────────
//  RING
// ─────────────────────────────────────────────────
function showRing(ball) {
  if (!ball) { ringEl.style.display='none'; return; }
  const sx=window.innerWidth/canvas.width;
  const sy=window.innerHeight/canvas.height;
  const sz=Math.max(sx,sy);
  ringEl.style.display='block';
  ringEl.style.left  =(ball.x*sx)+'px';
  ringEl.style.top   =(ball.y*sy)+'px';
  ringEl.style.width =(ball.diam*sz)+'px';
  ringEl.style.height=(ball.diam*sz)+'px';
}

// ─────────────────────────────────────────────────
//  SPEED
// ─────────────────────────────────────────────────
function calcSpeed(frames) {
  if (frames.length<MIN_FRAMES||!pxPerFoot) return null;
  const use=frames.slice(0,MAX_FRAMES);
  const vels=[];
  for (let i=1;i<use.length;i++) {
    const a=use[i-1],b=use[i];
    const dist=Math.hypot(b.x-a.x,b.y-a.y);
    const dt=(b.t-a.t)/1000;
    if (dt>0.003&&dt<0.12) vels.push((dist/pxPerFoot)/dt);
  }
  if (!vels.length) return null;
  vels.sort((a,b)=>a-b);
  const m=Math.floor(vels.length/2);
  return vels.length%2===0?(vels[m-1]+vels[m])/2:vels[m];
}

// ─────────────────────────────────────────────────
//  DISPLAY
// ─────────────────────────────────────────────────
function showSpeed(fps) {
  lastSpeed=fps;
  const val=showMph?fps*0.6818:fps;
  numEl.textContent =val.toFixed(1);
  unitEl.textContent=showMph?'mph':'ft / sec';
  dispEl.classList.add('visible');
  if (voiceOn) {
    try {
      speechSynthesis.cancel();
      const u=new SpeechSynthesisUtterance(val.toFixed(1));
      u.rate=0.9; speechSynthesis.speak(u);
    } catch(e){}
  }
}

function setStatus(txt,cls='') {
  statusEl.textContent=txt;
  statusEl.className=cls;
}

// ─────────────────────────────────────────────────
//  FINALIZE
// ─────────────────────────────────────────────────
function finalize() {
  const spd=calcSpeed(mFrames);
  mFrames=[];
  if (spd!==null&&spd>0.3&&spd<38) {
    state=S.DISPLAY;
    showSpeed(spd);
    setStatus('');
    showRing(null);
    clearTimeout(displayTmr);
    displayTmr=setTimeout(()=>{
      dispEl.classList.remove('visible');
      state=S.SCANNING; stillCount=0; armBall=null;
      setStatus('Looking for ball…');
    }, DISPLAY_MS);
  } else {
    state=S.SCANNING; stillCount=0; armBall=null;
    setStatus('Looking for ball…');
    showRing(null);
  }
}

// ─────────────────────────────────────────────────
//  MAIN LOOP
// ─────────────────────────────────────────────────
function loop() {
  requestAnimationFrame(loop);
  if (video.readyState<2) return;

  ctx.drawImage(video,0,0,canvas.width,canvas.height);
  const {data}=ctx.getImageData(0,0,canvas.width,canvas.height);
  const ball=detectBall(data);

  switch (state) {

    case S.SCANNING: {
      showRing(ball);
      if (!ball) {
        stillCount=0; armBall=null;
        setStatus('Looking for ball…');
        break;
      }
      setStatus('Ball found — hold still','found');
      if (!armBall) { armBall=ball; stillCount=0; break; }
      const moved=Math.hypot(ball.x-armBall.x,ball.y-armBall.y);
      if (moved<MOVE_PX) {
        stillCount++;
        armBall=ball; // drift-correct
        // calibrate from diameter while still
        if (ball.diam>MIN_DIAM) pxPerFoot=(ball.diam/BALL_IN)*12;
      } else {
        stillCount=0; armBall=ball;
      }
      if (stillCount>=STILL_N) {
        state=S.ARMED;
        setStatus('Ready','ready');
      }
      break;
    }

    case S.ARMED: {
      showRing(ball);
      if (!ball) {
        stillCount--;
        if (stillCount<-8) {
          state=S.SCANNING; stillCount=0; armBall=null;
          setStatus('Looking for ball…');
        }
        break;
      }
      const moved=Math.hypot(ball.x-armBall.x,ball.y-armBall.y);
      if (moved>MOVE_PX) {
        state=S.MEASURING;
        mFrames=[armBall,ball];
        setStatus('Reading…','reading');
        showRing(null);
      } else {
        armBall=ball;
        stillCount++;
      }
      break;
    }

    case S.MEASURING: {
      if (ball) {
        mFrames.push(ball);
        if (mFrames.length>=MAX_FRAMES) finalize();
      } else {
        mFrames.length>=MIN_FRAMES ? finalize() : (()=>{
          state=S.SCANNING; stillCount=0; armBall=null;
          setStatus('Looking for ball…'); showRing(null);
        })();
      }
      break;
    }

    case S.DISPLAY: break;
  }
}

// ─────────────────────────────────────────────────
//  CONTROLS
// ─────────────────────────────────────────────────
function toggleVoice() {
  voiceOn=!voiceOn;
  voiceBtn.textContent=voiceOn?'Voice On':'Voice Off';
  voiceBtn.classList.toggle('on',voiceOn);
  if (voiceOn) speechSynthesis.speak(new SpeechSynthesisUtterance(''));
}

function toggleUnit() {
  showMph=!showMph;
  unitBtn.textContent=showMph?'ft/s':'mph';
  unitBtn.classList.toggle('on',showMph);
  if (lastSpeed!==null) showSpeed(lastSpeed);
}

function cycleSens() {
  sensIdx=(sensIdx+1)%SENS.length;
  sensBtn.textContent=SENS[sensIdx].label;
  // reset so it re-finds ball with new threshold
  state=S.SCANNING; stillCount=0; armBall=null;
  setStatus('Looking for ball…'); showRing(null);
}

startCamera();
</script>
</body>
</html>
