<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Putt Speed</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      background: #000;
      font-family: 'DM Sans', system-ui, sans-serif;
      color: #fff;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      position: fixed;
    }

    #video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.65;
    }

    /* Hidden processing canvas */
    #canvas { display: none; }

    /* ── Overlay layout ── */
    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: env(safe-area-inset-top, 28px) 24px env(safe-area-inset-bottom, 28px);
      padding-top: max(env(safe-area-inset-top), 28px);
      padding-bottom: max(env(safe-area-inset-bottom), 28px);
    }

    /* ── Status pill ── */
    #status-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    #app-label {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
    }

    #status {
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      background: rgba(0,0,0,0.45);
      padding: 7px 18px;
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.1);
      transition: color 0.2s, border-color 0.2s;
    }

    #status.armed {
      color: rgba(255,255,255,0.9);
      border-color: rgba(255,255,255,0.35);
    }

    #status.measuring {
      color: #fff;
      border-color: rgba(255,255,255,0.6);
    }

    /* ── Big number ── */
    #speed-display {
      text-align: center;
      opacity: 0;
      transform: scale(0.94);
      transition: opacity 0.12s ease, transform 0.12s ease;
      pointer-events: none;
    }

    #speed-display.visible {
      opacity: 1;
      transform: scale(1);
    }

    #speed-number {
      font-size: clamp(80px, 22vw, 120px);
      font-weight: 700;
      letter-spacing: -0.05em;
      line-height: 1;
      color: #fff;
      text-shadow: 0 0 40px rgba(0,0,0,0.8);
    }

    #speed-unit {
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      margin-top: 8px;
    }

    /* ── Controls ── */
    #controls {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .btn {
      font-family: inherit;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      background: rgba(0,0,0,0.4);
      border: 1.5px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      padding: 10px 20px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .btn.on {
      color: #fff;
      border-color: rgba(255,255,255,0.5);
      background: rgba(255,255,255,0.1);
    }

    /* ── Ball ring indicator ── */
    #ball-ring {
      position: absolute;
      border: 2px solid rgba(255, 230, 0, 0.75);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      display: none;
      box-shadow: 0 0 8px rgba(255,230,0,0.3);
      transition: width 0.05s, height 0.05s;
    }

    /* ── Error state ── */
    #error-msg {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      text-align: center;
      padding: 32px;
    }

    #error-msg.show { display: flex; }
    #error-msg h2 { font-size: 20px; font-weight: 600; }
    #error-msg p { font-size: 14px; color: rgba(255,255,255,0.5); line-height: 1.5; }
  </style>
</head>
<body>

  <video id="video" playsinline autoplay muted></video>
  <canvas id="canvas"></canvas>
  <div id="ball-ring"></div>

  <div id="overlay">
    <div id="status-wrap">
      <div id="app-label">Putt Speed</div>
      <div id="status">Starting camera…</div>
    </div>

    <div id="speed-display">
      <div id="speed-number">0.0</div>
      <div id="speed-unit">ft / sec</div>
    </div>

    <div id="controls">
      <button class="btn on" id="voice-btn" onclick="toggleVoice()">Voice On</button>
      <button class="btn" id="unit-btn" onclick="toggleUnit()">Switch to mph</button>
    </div>
  </div>

  <div id="error-msg">
    <h2>Camera unavailable</h2>
    <p>Allow camera access in your browser settings, then reload the page.</p>
  </div>

  <script>
  // ═══════════════════════════════════════════════════════════
  //  CONFIG
  // ═══════════════════════════════════════════════════════════
  const CFG = {
    BALL_DIAMETER_IN : 1.68,   // USGA spec, inches
    LUM_THRESH       : 155,    // luminance threshold for white ball
    SAT_MAX          : 60,     // max colour saturation (white = low sat)
    MIN_DIAM_PX      : 22,     // smallest valid ball diameter in pixels
    MAX_DIAM_PX      : 380,    // largest valid ball diameter in pixels
    ASPECT_MIN       : 0.40,   // min bbox aspect ratio (circles ≈ 1.0)
    STRIDE           : 4,      // pixel scan stride — every 4th px
    STILL_NEEDED     : 18,     // still frames before arming
    MOTION_PX        : 9,      // pixel movement to trigger measurement
    MIN_FRAMES       : 3,      // minimum frames for a valid reading
    MAX_FRAMES       : 10,     // frames to collect during measurement
    DISPLAY_MS       : 4200,   // how long to show the speed
    SPEED_MIN        : 0.4,    // reject readings below this ft/s
    SPEED_MAX        : 35,     // reject readings above this ft/s
  };

  // ═══════════════════════════════════════════════════════════
  //  STATE
  // ═══════════════════════════════════════════════════════════
  const S = { BOOT: 0, SCANNING: 1, ARMED: 2, MEASURING: 3, DISPLAY: 4 };
  let state      = S.BOOT;
  let stillCount = 0;
  let lastBall   = null;   // {x, y, r, t}
  let armBall    = null;
  let mFrames    = [];     // measurement frame buffer
  let displayTmr = null;
  let lastSpeed  = null;
  let voiceOn    = true;
  let showMph    = false;
  let animId     = null;

  // ═══════════════════════════════════════════════════════════
  //  DOM
  // ═══════════════════════════════════════════════════════════
  const video    = document.getElementById('video');
  const canvas   = document.getElementById('canvas');
  const ctx      = canvas.getContext('2d', { willReadFrequently: true });
  const statusEl = document.getElementById('status');
  const dispEl   = document.getElementById('speed-display');
  const numEl    = document.getElementById('speed-number');
  const unitEl   = document.getElementById('speed-unit');
  const ringEl   = document.getElementById('ball-ring');
  const voiceBtn = document.getElementById('voice-btn');
  const unitBtn  = document.getElementById('unit-btn');
  const errMsg   = document.getElementById('error-msg');

  // ═══════════════════════════════════════════════════════════
  //  CAMERA
  // ═══════════════════════════════════════════════════════════
  async function startCamera() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: 'user',
          width:     { ideal: 1280 },
          height:    { ideal: 720  },
          frameRate: { ideal: 60, min: 30 }
        },
        audio: false
      });
      video.srcObject = stream;
      video.addEventListener('loadedmetadata', () => {
        canvas.width  = video.videoWidth;
        canvas.height = video.videoHeight;
        state = S.SCANNING;
        setStatus('Scanning for ball…');
        animId = requestAnimationFrame(loop);
      });
    } catch (e) {
      errMsg.classList.add('show');
    }
  }

  // ═══════════════════════════════════════════════════════════
  //  BALL DETECTION  — two-pass white blob finder
  // ═══════════════════════════════════════════════════════════
  function detectBall(data, w, h) {
    const s = CFG.STRIDE;

    // Pass 1 — find all white pixels, get rough centroid
    let sx = 0, sy = 0, n = 0;
    let x0 = w, x1 = 0, y0 = h, y1 = 0;

    for (let y = 0; y < h; y += s) {
      for (let x = 0; x < w; x += s) {
        const i = (y * w + x) << 2;
        const r = data[i], g = data[i+1], b = data[i+2];
        const lum = 0.299*r + 0.587*g + 0.114*b;
        const sat = Math.max(r,g,b) - Math.min(r,g,b);
        if (lum > CFG.LUM_THRESH && sat < CFG.SAT_MAX) {
          sx += x; sy += y; n++;
          if (x < x0) x0 = x; if (x > x1) x1 = x;
          if (y < y0) y0 = y; if (y > y1) y1 = y;
        }
      }
    }

    if (n < 12) return null;

    const roughCx = sx / n;
    const roughCy = sy / n;
    const bboxW   = x1 - x0;
    const bboxH   = y1 - y0;
    const diam    = Math.max(bboxW, bboxH);

    // Quick size + shape filter before pass 2
    if (diam < CFG.MIN_DIAM_PX || diam > CFG.MAX_DIAM_PX) return null;
    const aspect = Math.min(bboxW, bboxH) / (Math.max(bboxW, bboxH) || 1);
    if (aspect < CFG.ASPECT_MIN) return null;

    // Pass 2 — keep only pixels within 1.5× radius of rough centroid
    // This strips stray bright patches (shoes, glare) away from the main blob
    const maxDist = diam * 0.85;
    let sx2 = 0, sy2 = 0, n2 = 0;
    let x02 = w, x12 = 0, y02 = h, y12 = 0;

    for (let y = 0; y < h; y += s) {
      for (let x = 0; x < w; x += s) {
        const i = (y * w + x) << 2;
        const r = data[i], g = data[i+1], b = data[i+2];
        const lum = 0.299*r + 0.587*g + 0.114*b;
        const sat = Math.max(r,g,b) - Math.min(r,g,b);
        if (lum > CFG.LUM_THRESH && sat < CFG.SAT_MAX) {
          const dx = x - roughCx, dy = y - roughCy;
          if (Math.sqrt(dx*dx + dy*dy) <= maxDist) {
            sx2 += x; sy2 += y; n2++;
            if (x < x02) x02 = x; if (x > x12) x12 = x;
            if (y < y02) y02 = y; if (y > y12) y12 = y;
          }
        }
      }
    }

    if (n2 < 10) return null;

    const cx   = sx2 / n2;
    const cy   = sy2 / n2;
    const bW2  = x12 - x02;
    const bH2  = y12 - y02;
    const d2   = Math.max(bW2, bH2);

    if (d2 < CFG.MIN_DIAM_PX || d2 > CFG.MAX_DIAM_PX) return null;

    return { x: cx, y: cy, r: d2 / 2, t: performance.now() };
  }

  // ═══════════════════════════════════════════════════════════
  //  SPEED  — median of per-frame velocities, ball as ruler
  // ═══════════════════════════════════════════════════════════
  function calcSpeed(frames) {
    const use = frames.slice(0, CFG.MAX_FRAMES);
    if (use.length < CFG.MIN_FRAMES) return null;

    // Average pixels-per-foot from ball diameters across frames
    let ppf = 0;
    use.forEach(f => { ppf += (f.r * 2 / CFG.BALL_DIAMETER_IN) * 12; });
    ppf /= use.length;
    if (ppf <= 0) return null;

    // Per-frame velocities
    const vels = [];
    for (let i = 1; i < use.length; i++) {
      const a = use[i-1], b = use[i];
      const dx = b.x - a.x, dy = b.y - a.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      const dt   = (b.t - a.t) / 1000;
      if (dt > 0.003 && dt < 0.12) {
        vels.push((dist / ppf) / dt);
      }
    }

    if (vels.length === 0) return null;

    // Median
    vels.sort((a, b) => a - b);
    const m = Math.floor(vels.length / 2);
    return vels.length % 2 === 0
      ? (vels[m-1] + vels[m]) / 2
      : vels[m];
  }

  // ═══════════════════════════════════════════════════════════
  //  DISPLAY
  // ═══════════════════════════════════════════════════════════
  function showSpeed(fps) {
    lastSpeed = fps;
    const val  = showMph ? fps * 0.6818 : fps;
    const unit = showMph ? 'mph' : 'ft / sec';
    numEl.textContent = val.toFixed(1);
    unitEl.textContent = unit;
    dispEl.classList.add('visible');

    if (voiceOn) {
      try {
        speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(val.toFixed(1));
        u.rate  = 0.92;
        u.pitch = 1.0;
        u.volume = 1.0;
        speechSynthesis.speak(u);
      } catch(e) {}
    }
  }

  function hideSpeed() {
    dispEl.classList.remove('visible');
  }

  function setStatus(txt, cls = '') {
    statusEl.textContent = txt;
    statusEl.className   = cls;
  }

  // ═══════════════════════════════════════════════════════════
  //  RING INDICATOR — visual ball tracker on screen
  // ═══════════════════════════════════════════════════════════
  function updateRing(ball) {
    if (!ball) { ringEl.style.display = 'none'; return; }
    const scaleX = window.innerWidth  / canvas.width;
    const scaleY = window.innerHeight / canvas.height;
    const px = ball.r * 2;
    ringEl.style.display = 'block';
    ringEl.style.left    = (ball.x * scaleX) + 'px';
    ringEl.style.top     = (ball.y * scaleY) + 'px';
    ringEl.style.width   = (px * scaleX) + 'px';
    ringEl.style.height  = (px * scaleY) + 'px';
  }

  // ═══════════════════════════════════════════════════════════
  //  FINALIZE MEASUREMENT
  // ═══════════════════════════════════════════════════════════
  function finalize() {
    const speed = calcSpeed(mFrames);
    mFrames = [];

    if (speed !== null && speed > CFG.SPEED_MIN && speed < CFG.SPEED_MAX) {
      state = S.DISPLAY;
      showSpeed(speed);
      setStatus('');

      clearTimeout(displayTmr);
      displayTmr = setTimeout(() => {
        hideSpeed();
        reset();
      }, CFG.DISPLAY_MS);
    } else {
      reset();
    }
  }

  function reset() {
    state      = S.SCANNING;
    stillCount = 0;
    lastBall   = null;
    armBall    = null;
    mFrames    = [];
    setStatus('Scanning for ball…');
  }

  // ═══════════════════════════════════════════════════════════
  //  MAIN LOOP
  // ═══════════════════════════════════════════════════════════
  function loop() {
    animId = requestAnimationFrame(loop);

    if (video.readyState < 2) return;

    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    const { data } = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const ball = detectBall(data, canvas.width, canvas.height);

    updateRing(state === S.SCANNING || state === S.ARMED ? ball : null);

    switch (state) {

      case S.SCANNING: {
        if (!ball) {
          stillCount = 0;
          lastBall   = null;
          setStatus('Scanning for ball…');
          break;
        }
        if (lastBall) {
          const dx = ball.x - lastBall.x, dy = ball.y - lastBall.y;
          if (Math.sqrt(dx*dx + dy*dy) < CFG.MOTION_PX) {
            stillCount++;
          } else {
            stillCount = 0;
          }
        }
        if (stillCount >= CFG.STILL_NEEDED) {
          state   = S.ARMED;
          armBall = ball;
          setStatus('Ready', 'armed');
        } else {
          setStatus(stillCount > 4 ? 'Hold still…' : 'Scanning for ball…');
        }
        lastBall = ball;
        break;
      }

      case S.ARMED: {
        if (!ball) {
          // Brief loss — don't immediately re-scan; hold for a few frames
          stillCount--;
          if (stillCount < -5) reset();
          break;
        }
        const dx = ball.x - armBall.x, dy = ball.y - armBall.y;
        if (Math.sqrt(dx*dx + dy*dy) > CFG.MOTION_PX) {
          state   = S.MEASURING;
          mFrames = [armBall, ball];
          setStatus('Measuring…', 'measuring');
        } else {
          armBall    = ball; // drift-correct the arm position
          stillCount = CFG.STILL_NEEDED;
        }
        break;
      }

      case S.MEASURING: {
        if (ball) {
          mFrames.push(ball);
          if (mFrames.length >= CFG.MAX_FRAMES) finalize();
        } else {
          // Ball left frame — calculate with what we have
          if (mFrames.length >= CFG.MIN_FRAMES) {
            finalize();
          } else {
            reset(); // not enough data
          }
        }
        break;
      }

      case S.DISPLAY:
        // idle — waiting for displayTmr to call reset()
        break;
    }
  }

  // ═══════════════════════════════════════════════════════════
  //  CONTROLS
  // ═══════════════════════════════════════════════════════════
  function toggleVoice() {
    voiceOn = !voiceOn;
    voiceBtn.textContent = voiceOn ? 'Voice On' : 'Voice Off';
    voiceBtn.classList.toggle('on', voiceOn);
    // Unlock speech synthesis on first tap (iOS requires gesture)
    if (voiceOn) {
      const u = new SpeechSynthesisUtterance('');
      speechSynthesis.speak(u);
    }
  }

  function toggleUnit() {
    showMph = !showMph;
    unitBtn.textContent = showMph ? 'Switch to ft/s' : 'Switch to mph';
    unitBtn.classList.toggle('on', showMph);
    if (lastSpeed !== null) showSpeed(lastSpeed);
  }

  // ═══════════════════════════════════════════════════════════
  //  INIT
  // ═══════════════════════════════════════════════════════════
  startCamera();
  </script>
</body>
</html>
